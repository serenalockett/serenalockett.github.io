<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver une séance | Serena Lockett</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<body class="py-12 px-6">

    </div>

    <div class="text-center mt-8 text-sm text-gray-400">
        <p>Difficultés avec le calendrier ? <a href="https://calendar.app.google/8WzW9eihViTNfAG98" class="underline hover:text-[#5E7161]">Réservez directement via Google ici.</a></p>
    </div>

    <a href="index.html" class="fixed bottom-8 right-8 bg-[#5E7161] text-white px-6 py-3 rounded-full shadow-xl hover:bg-[#4a5a4d] transition-all z-50 text-[14px] uppercase tracking-widest flex items-center gap-2">
