<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serena Lockett | Thérapeute en relation d'aide</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { color-scheme: light; }
        img { filter: none !important; }
        body { font-family: 'Work Sans', sans-serif; background-color: #FDFDFB; color: #4A4A4A; overflow-x: hidden; }
        
        #navbar {
            background-color: rgba(94, 113, 97, 0.6); 
            transition: all 0.4s ease;
            position: fixed;
            left: 50%; transform: translateX(-50%);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .header-hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -20px) !important; }
        #mobile-menu { transition: transform 0.4s ease; transform: translateX(100%); }
        #mobile-menu.open { transform: translateX(0); }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        #contact { background-size: cover; background-position: center; position: relative; }
        @media (max-width: 1023px) { #contact { background-image: url('office-chairs.jpg'); } }
    </style>
</head>
<body>

    <nav id="navbar" class="py-3 px-6 md:px-12 flex justify-between items-center shadow-md w-[92%] top-[15px] rounded-[50px] md:top-[20px]">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="h-8 md:h-10 w-auto">
            <div class="whitespace-nowrap">
                <div class="text-[18px] md:text-[22px] text-white leading-tight font-medium">Serena Lockett, R.A.</div>
                <div class="text-[14px] md:text-[16px] text-white italic font-light">Thérapeute en relation d'aide</div>
            </div>
        </div>
        
        <div class="hidden lg:flex items-center text-white uppercase tracking-widest font-medium gap-[2px]">
            <a href="#about" class="text-[13px] px-2 py-1 hover:opacity-75">À propos</a>
            <a href="#services" class="text-[13px] px-2 py-1 hover:opacity-75">Services</a>
            <a href="#contact" class="text-[13px] px-2 py-1 hover:opacity-75">Contact</a>
            <a href="booking.html" class="text-[13px] bg-[#5E7161] px-5 py-2 rounded-full ml-4 transition-all hover:bg-opacity-90">Rendez-vous</a>
        </div>

        <button id="menu-open" class="lg:hidden text-white"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg></button>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 bg-[#5E7161] z-[1001] flex flex-col items-center justify-center space-y-8 text-white text-2xl uppercase">
        <button id="menu-close" class="absolute top-8 right-8 text-4xl">&times;</button>
        <a href="#about" class="m-link">À propos</a>
        <a href="#services" class="m-link">Services</a>
        <a href="#contact" class="m-link">Contact</a>
        <a href="booking.html" class="m-link bg-white text-[#5E7161] px-10 py-3 rounded-full font-bold">Rendez-vous</a>
    </div>

    </body>
</html>
