<style>
    body { font-family: 'Work Sans', sans-serif; background-color: #FDFDFB; color: #4A4A4A; }
    
    /* The "Pill" Floating Header */
    #navbar {
        background-color: rgba(94, 113, 97, 0.5); /* #5E7161 at 50% opacity */
        transition: opacity 0.5s ease, transform 0.5s ease, background-color 0.3s ease;
        position: fixed;
        top: 20px; /* Space from the very top */
        left: 50%;
        transform: translateX(-50%); /* Centers the pill */
        width: 95%; /* Adjust this to make the pill wider or narrower */
        max-width: 1200px;
        z-index: 1000;
        border-radius: 50px; /* Highly rounded corners for the pill look */
        backdrop-blur: 8px; /* Adds that soft frosted glass effect */
    }

    .header-hidden { 
        opacity: 0 !important; 
        pointer-events: none; 
        transform: translate(-50%, -20px) !important; /* Slide up slightly when hiding */
    }

    /* Adjusted Font Sizes per your specs */
    .name-header { font-size: 28px; color: white; line-height: 1; font-weight: 400; }
    .title-header { font-size: 19px; color: white; font-style: italic; font-weight: 300; }
</style>

<nav id="navbar" class="py-3 px-8 md:px-12 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-4">
        <img src="logo.png" alt="Logo" class="h-10 w-auto">
        <div>
            <div class="name-header">Serena Lockett, R.A.</div>
            <div class="title-header">Thérapeute en relation d'aide</div>
        </div>
    </div>
    
    <div class="hidden md:flex items-center gap-8 text-white text-[14px] uppercase tracking-widest font-medium">
        <a href="#about" class="hover:opacity-70 transition-opacity">À propos</a>
        <a href="#services" class="hover:opacity-70 transition-opacity">Services</a>
        <a href="#contact" class="hover:opacity-70 transition-opacity">Contact</a>
        <a href="#booking" class="bg-[#5E7161] px-6 py-2 rounded-full hover:bg-opacity-90 transition-all">Rendez-vous</a>
    </div>
</nav>
